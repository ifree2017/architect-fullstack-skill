name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md exists
        run: |
          if [ ! -f "SKILL.md" ]; then
            echo "Error: SKILL.md not found"
            exit 1
          fi

      - name: Validate required directories
        run: |
          for dir in core adapters rules workflow packs_rendered; do
            if [ ! -d "$dir" ]; then
              echo "Error: Required directory $dir not found"
              exit 1
            fi
          done

      - name: Validate packs_rendered has content
        run: |
          count=$(ls -1 packs_rendered/*.md 2>/dev/null | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "Error: packs_rendered is empty"
            exit 1
          fi
          echo "Found $count pack files"

  build-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create release archive
        run: |
          # Create temp directory for clean archive
          mkdir -p release_temp
          cp -r SKILL.md TEST.md install.sh core adapters rules workflow examples packs_rendered release_temp/
          rm -f release_temp/install.sh
          
          # Create archive
          tar -czvf architect-fullstack-skill-${{ env.VERSION }}.tar.gz -C release_temp .
          rm -rf release_temp
          
          ls -la *.tar.gz

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: architect-fullstack-skill-*.tar.gz
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Success notification
        run: |
          echo "✅ Release ${{ env.VERSION }} published successfully!"
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
